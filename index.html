<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Compose Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#f5f5f5;--surface:#fff;--sv:#f0edf6;--primary:#6200EA;--pl:#ede7f6;--on-p:#fff;--text:#1c1b1f;--ts:#49454f;--outline:#cac4d0;--r:16px;--rs:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);--danger:#b71c1c;--dl:#ffebee}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

        header{background:var(--surface);border-bottom:1px solid var(--outline);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
        header .logo{display:flex;align-items:center;gap:10px}
        header .logo .material-icons-round{font-size:26px;color:var(--primary)}
        header h1{font-size:18px;font-weight:700}
        header .sub{font-size:11px;color:var(--ts)}
        .ha{display:flex;gap:8px}

        .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
        .btn .material-icons-round{font-size:17px}
        .btn-p{background:var(--primary);color:var(--on-p)}.btn-p:hover{background:#5000d4}
        .btn-o{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}.btn-o:hover{background:var(--pl)}
        .btn-g{background:transparent;color:var(--ts)}.btn-g:hover{background:var(--sv)}
        .btn-s{padding:5px 10px;font-size:12px}.btn-s .material-icons-round{font-size:15px}

        main{display:grid;grid-template-columns:1fr 430px;gap:20px;padding:20px 24px;max-width:100%;margin:0 auto}
        @media(max-width:900px){main{grid-template-columns:1fr}}

        .panel{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
        .ph{padding:16px 20px 12px;border-bottom:1px solid var(--outline);display:flex;align-items:center;justify-content:space-between}
        .ph h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
        .ph h2 .material-icons-round{font-size:19px;color:var(--primary)}
        .pb{padding:16px 20px}

        .add-bar{display:flex;gap:6px;padding:12px 20px;border-bottom:1px solid var(--outline);background:var(--sv);flex-wrap:wrap}
        .add-bar span.lbl{font-size:12px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;line-height:30px;margin-right:4px}

        #elementList{min-height:60px}
        .el-card{display:flex;align-items:stretch;background:var(--surface);border:1.5px solid var(--outline);border-radius:var(--rs);margin-bottom:8px;transition:border-color .15s,box-shadow .15s}
        .el-card:hover{border-color:var(--primary)}
        .el-card.dragging{opacity:.4}
        .el-card.drag-over{border-color:var(--primary);box-shadow:0 0 0 2px var(--pl)}
        .el-handle{display:flex;align-items:center;padding:0 8px;cursor:grab;color:var(--outline);border-right:1px solid var(--outline)}
        .el-handle:active{cursor:grabbing}
        .el-handle .material-icons-round{font-size:18px}
        .el-body{flex:1;padding:10px 12px;min-width:0}
        .el-top{display:flex;align-items:center;gap:8px}
        .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:6px}
        .badge.text{background:#e8eaf6;color:#283593}.badge.button{background:#fce4ec;color:#c62828}.badge.spacer{background:#e0f2f1;color:#00695c}
        .badge.divider{background:#fff3e0;color:#e65100}.badge.card{background:#e3f2fd;color:#1565c0}.badge.row{background:#f3e5f5;color:#7b1fa2}.badge.icon{background:#fce4ec;color:#880e4f}
        .el-summary{font-size:13px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .el-actions{display:flex;align-items:center;padding:0 6px;gap:2px}
        .el-actions button{background:none;border:none;cursor:pointer;padding:4px;border-radius:6px;color:var(--ts);display:flex;align-items:center}
        .el-actions button:hover{background:var(--sv)}
        .el-actions button.del:hover{background:var(--dl);color:var(--danger)}
        .el-actions button .material-icons-round{font-size:18px}

        .el-editor{max-height:0;overflow:hidden;transition:max-height .25s ease,opacity .2s ease;opacity:0;margin-top:0;padding-top:0;border-top:none}
        .el-card.expanded .el-editor{max-height:none;overflow:visible;opacity:1;margin-top:10px;padding-top:10px;border-top:1px solid var(--outline)}
        .field{margin-bottom:10px}
        .field label{display:block;font-size:11px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
        .field input[type="text"],.field input[type="number"]{width:100%;padding:7px 10px;border:1.5px solid var(--outline);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);background:var(--surface)}
        .field input:focus{outline:none;border-color:var(--primary)}
        .fr{display:flex;gap:10px}.fr .field{flex:1}
        .cf{display:flex;align-items:center;gap:8px}
        .cf input[type="color"]{width:28px;height:28px;border:none;border-radius:6px;cursor:pointer;padding:0;background:none}
        .cf input[type="color"]::-webkit-color-swatch-wrapper{padding:0}
        .cf input[type="color"]::-webkit-color-swatch{border:1px solid rgba(0,0,0,.1);border-radius:4px}
        .cf code{font-size:11px;font-family:'SF Mono',monospace;color:var(--ts);background:var(--sv);padding:2px 6px;border-radius:4px}

        .children-area{margin-top:8px;padding:10px;background:var(--sv);border-radius:8px;border:1px dashed var(--outline)}
        .children-area .child-label{font-size:11px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
        .child-item{background:var(--surface);border:1px solid var(--outline);border-radius:8px;margin-bottom:4px;font-size:12px}
        .child-item:not(.child-expanded){overflow:hidden}
        .child-item .child-hdr{display:flex;align-items:center;gap:8px;padding:6px 8px;cursor:pointer}
        .child-item .child-hdr:hover{background:var(--sv)}
        .child-item .badge{font-size:9px;padding:1px 6px}
        .child-item .child-summary{flex:1;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .child-item .child-del-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--ts);display:flex;border-radius:4px;flex-shrink:0}
        .child-item .child-del-btn:hover{color:var(--danger);background:var(--dl)}
        .child-editor{max-height:0;overflow:hidden;transition:max-height .25s ease,opacity .2s ease;opacity:0;padding:0;border-top:none;background:var(--sv)}
        .child-item.child-expanded > .child-editor,
        .child-item.child-expanded > div > .child-editor{max-height:none;overflow:visible;opacity:1;padding:8px;border-top:1px solid var(--outline)}
        .child-editor .field{margin-bottom:8px}
        .child-editor .field label{font-size:10px}
        .child-editor .field input[type="text"],.child-editor .field input[type="number"]{padding:5px 8px;font-size:12px}
        .child-editor .fr{display:flex;gap:8px}
        .child-editor .fr .field{flex:1}

        .bg-sec{padding:12px 20px;border-top:1px solid var(--outline);display:flex;align-items:center;gap:12px}
        .bg-sec label{font-size:12px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px}
        .sb{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:16px;font-size:11px;font-weight:600}
        .sb .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
        .sb.ok{background:#e8f5e9;color:#2e7d32}.sb.err{background:#fce4ec;color:#c62828}.sb.action{background:#e3f2fd;color:#1565c0}

        .phone-frame{width:380px;height:824px;border-radius:44px;border:6px solid #1c1b1f;overflow:hidden;margin:0 auto;box-shadow:0 8px 34px rgba(0,0,0,.16);position:relative}
        .phone-camera{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:10px;height:10px;background:#1c1b1f;border-radius:50%;z-index:2;box-shadow:0 0 0 2px #2a2a2a}

        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#323232;color:#fff;padding:10px 20px;border-radius:var(--rs);font-size:13px;font-weight:500;z-index:100;transition:transform .3s;display:flex;align-items:center;gap:8px}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .toast .material-icons-round{font-size:17px}

        .info-card{background:var(--pl);border-radius:var(--rs);padding:12px 14px;margin-top:8px}
        .info-card p{font-size:12px;color:var(--ts);line-height:1.4}
        .info-card code{font-size:11px;background:rgba(98,0,234,.1);padding:2px 5px;border-radius:4px;font-family:'SF Mono',monospace;word-break:break-all}
        .empty-state{text-align:center;padding:32px 16px;color:var(--ts)}
        .empty-state .material-icons-round{font-size:40px;color:var(--outline);margin-bottom:8px}
        .empty-state p{font-size:13px}

        .screen-bar{background:var(--surface);border-bottom:1px solid var(--outline);padding:10px 24px;display:flex;align-items:center;gap:8px;max-width:100%;margin:0 auto}
        .screen-bar .lbl{font-size:12px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
        .screen-tab{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1.5px solid var(--outline);border-radius:var(--rs);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--ts);transition:all .15s}
        .screen-tab:hover{border-color:var(--primary);color:var(--primary)}
        .screen-tab.active{background:var(--primary);color:var(--on-p);border-color:var(--primary)}
        .screen-tab .material-icons-round{font-size:16px}
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <span class="material-icons-round">widgets</span>
            <div><h1>Remote Compose Editor</h1><div class="sub">Drag-and-drop UI builder &middot; <span id="versionLabel">v1</span></div></div>
        </div>
        <div class="ha">
            <span class="sb" id="deployStatus"><span class="dot"></span><span id="deployStatusText">Ready</span></span>
            <div style="display:flex;align-items:center;gap:4px;border:1.5px solid var(--outline);border-radius:8px;padding:2px 4px 2px 8px">
                <input type="password" id="ghToken" placeholder="GitHub Token" style="border:none;outline:none;font-size:11px;font-family:inherit;width:160px;background:transparent">
                <button class="btn btn-g btn-s" onclick="toggleToken()" style="padding:2px"><span class="material-icons-round" id="tokenEye" style="font-size:14px">visibility</span></button>
            </div>
            <button class="btn btn-g" onclick="resetToDefaults()"><span class="material-icons-round">restart_alt</span>Reset</button>
            <button class="btn btn-o" onclick="copyJson()"><span class="material-icons-round">content_copy</span>Copy JSON</button>
            <button class="btn btn-p" onclick="deployConfig()"><span class="material-icons-round">cloud_upload</span>Deploy</button>
        </div>
    </header>
    <div class="screen-bar">
        <span class="lbl">Screen:</span>
        <button class="screen-tab active" id="tab-home" onclick="switchScreen('home')"><span class="material-icons-round">home</span>Home</button>
        <button class="screen-tab" id="tab-detail" onclick="switchScreen('detail')"><span class="material-icons-round">article</span>Detail</button>

    </div>
    <main>
        <div class="panel">
            <div class="ph">
                <h2><span class="material-icons-round">tune</span>Layout Builder</h2>
                <span style="font-size:12px;color:var(--ts)" id="elCount">0 elements</span>
            </div>
            <div class="add-bar">
                <span class="lbl">Add:</span>
                <button class="btn btn-o btn-s" onclick="addElement('text')"><span class="material-icons-round">title</span>Text</button>
                <button class="btn btn-o btn-s" onclick="addElement('button')"><span class="material-icons-round">smart_button</span>Button</button>
                <button class="btn btn-o btn-s" onclick="addElement('spacer')"><span class="material-icons-round">space_bar</span>Spacer</button>
                <button class="btn btn-o btn-s" onclick="addElement('divider')"><span class="material-icons-round">horizontal_rule</span>Divider</button>
                <button class="btn btn-o btn-s" onclick="addElement('card')"><span class="material-icons-round">crop_square</span>Card</button>
                <button class="btn btn-o btn-s" onclick="addElement('row')"><span class="material-icons-round">view_column</span>Row</button>
            </div>
            <div class="pb" id="elementList"></div>
            <div class="bg-sec">
                <label>Background</label>
                <div class="cf"><input type="color" id="bgColor" value="#F5F0FF" oninput="updatePreview()"><code id="bgColorCode">#F5F0FF</code></div>
            </div>
        </div>
        <div>
            <div class="panel" style="position:sticky;top:76px">
                <div class="ph"><h2><span class="material-icons-round">phone_android</span>Live Preview</h2></div>
                <div class="pb" style="display:flex;justify-content:center;padding:20px 12px">
                    <div class="phone-frame"><div class="phone-camera"></div><iframe id="composePreview" src="preview/index.html" onload="onPreviewLoad()" style="width:100%;height:100%;border:none;background:white"></iframe></div>
                </div>
            </div>
        </div>
    </main>
    <div class="toast" id="toast"><span class="material-icons-round" id="toastIcon">check_circle</span><span id="toastMsg"></span></div>

<script>
const REPO='phcdevelop',REPO_N='remotecompose';
const screens={
    home:{file:'config.json',label:'Home',elements:[],bg:'#F5F0FF',scrollable:false,padding:null},
    detail:{file:'config_detail.json',label:'Detail',elements:[],bg:'#F0F4F8',scrollable:false,padding:null}
};
let activeScreen='home';
let elements=[],dragIdx=null,nextId=1,expandedIdx=-1,expandedChildId=null,expandedGcId=null;
function uid(){return String(nextId++)}
function currentFile(){return screens[activeScreen].file}
const defaultsHome=[
    {type:'text',text:'Remote Compose',color:'#4A148C',fontSize:32},
    {type:'spacer',height:4},
    {type:'text',text:'Server-driven UI, rendered natively',color:'#7E57C2',fontSize:14},
    {type:'spacer',height:20},
    {type:'card',color:'#FFFFFF',cornerRadius:20,borderColor:'#E0D6F2',borderWidth:1,paddingH:20,paddingV:16,children:[
        {type:'text',text:'Dynamic Layouts',color:'#1A1A2E',fontSize:18},
        {type:'spacer',height:4},
        {type:'text',text:'Add, remove, reorder UI elements from the web — no app update needed.',color:'#666666',fontSize:13}
    ]},
    {type:'spacer',height:10},
    {type:'card',color:'#FFFFFF',cornerRadius:20,borderColor:'#E0D6F2',borderWidth:1,paddingH:20,paddingV:16,actionName:'card_tap',children:[
        {type:'text',text:'Click Handling',color:'#1A1A2E',fontSize:18},
        {type:'spacer',height:4},
        {type:'text',text:'Tap this card — the click event is handled by the host app.',color:'#666666',fontSize:13}
    ]},
    {type:'spacer',height:10},
    {type:'row',children:[
        {type:'button',text:'Action A',color:'#6200EA',textColor:'#FFFFFF',fontSize:14,cornerRadius:24,actionName:'action_a'},
        {type:'button',text:'Action B',color:'#00897B',textColor:'#FFFFFF',fontSize:14,cornerRadius:24,actionName:'action_b'}
    ]},
    {type:'spacer',height:6},
    {type:'divider',color:'#E0D6F2',height:1},
    {type:'spacer',height:6},
    {type:'button',text:'Go to Detail Screen',color:'#4A148C',textColor:'#FFFFFF',fontSize:16,cornerRadius:28,actionName:'navigate:detail',borderColor:'#7E57C2',borderWidth:2},
    {type:'spacer',height:8},
    {type:'text',text:'Change anything from the browser. No app update needed.',color:'#9CA3AF',fontSize:12}
];
const defaultsDetail=[
    {type:'spacer',height:8},
    {type:'text',text:'Feature Showcase',color:'#1A1A2E',fontSize:26},
    {type:'spacer',height:4},
    {type:'text',text:'Everything below is server-driven',color:'#6B7280',fontSize:13},
    {type:'spacer',height:16},
    {type:'card',color:'#FFFFFF',cornerRadius:16,borderColor:'#E2E8F0',borderWidth:1,paddingH:18,paddingV:14,children:[
        {type:'text',text:'Remote Layouts',color:'#6200EA',fontSize:16},
        {type:'spacer',height:4},
        {type:'text',text:'Text, buttons, cards, rows, spacers, dividers \u2014 all rendered natively via Remote Compose.',color:'#6B7280',fontSize:12}
    ]},
    {type:'spacer',height:8},
    {type:'card',color:'#FFFFFF',cornerRadius:16,borderColor:'#E2E8F0',borderWidth:1,paddingH:18,paddingV:14,children:[
        {type:'text',text:'Click Actions',color:'#00897B',fontSize:16},
        {type:'spacer',height:4},
        {type:'text',text:'Buttons fire HostAction events. The app handles them \u2014 toasts, navigation, or custom logic.',color:'#6B7280',fontSize:12}
    ]},
    {type:'spacer',height:8},
    {type:'card',color:'#FFFFFF',cornerRadius:16,borderColor:'#E2E8F0',borderWidth:1,paddingH:18,paddingV:14,actionName:'card_clicked',children:[
        {type:'text',text:'Clickable Cards',color:'#C62828',fontSize:16},
        {type:'spacer',height:4},
        {type:'text',text:'Tap this card. The entire surface is a click target, not just a button.',color:'#6B7280',fontSize:12}
    ]},
    {type:'spacer',height:12},
    {type:'divider',color:'#E2E8F0',height:1},
    {type:'spacer',height:12},
    {type:'row',children:[
        {type:'button',text:'Toast',color:'#6200EA',textColor:'#FFFFFF',fontSize:13,cornerRadius:20,actionName:'show_toast'},
        {type:'button',text:'Navigate',color:'#00897B',textColor:'#FFFFFF',fontSize:13,cornerRadius:20,actionName:'navigate:home'},
        {type:'button',text:'Alert',color:'#C62828',textColor:'#FFFFFF',fontSize:13,cornerRadius:20,actionName:'show_alert'}
    ]},
    {type:'spacer',height:12},
    {type:'text',text:'No app update required.',color:'#9CA3AF',fontSize:11}
];
function init(){const t=localStorage.getItem('gh_token');if(t)document.getElementById('ghToken').value=t;updateVersionLabel();fetchScreen('home');fetchScreen('detail')}
const BUILD_VERSION=84;
function updateVersionLabel(){document.getElementById('versionLabel').textContent='0.0.'+BUILD_VERSION+'-alpha'}
async function fetchScreen(key){
    const s=screens[key];
    try{const r=await fetch(s.file+'?'+Date.now());if(r.ok){const c=await r.json();s.bg=c.backgroundColor||s.bg;if(c.scrollable!=null)s.scrollable=c.scrollable;if(c.padding!=null)s.padding=c.padding;s.elements=(c.elements||[]).map(e=>assignIds(e));nextId=Math.max(nextId,maxId(s.elements)+1)}else{loadScreenDefs(key)}}catch{loadScreenDefs(key)}
    if(key===activeScreen)activateScreen()}
const defaultsEstimates=[
    {type:'spacer',height:4},
    {type:'card',color:'#FFFFFF',cornerRadius:12,paddingH:0,paddingV:0,borderColor:'#D0D0D0',borderWidth:2,align:'start',actionName:'navigate:estimate_detail',children:[
        {type:'card',color:'#00BCD4',cornerRadius:0,paddingH:14,paddingV:6,align:'start',children:[{type:'text',text:'Best',color:'#FFFFFF',fontSize:13}]},
        {type:'card',color:'#FFFFFF',cornerRadius:0,paddingH:14,paddingV:10,align:'start',children:[
            {type:'text',text:'Test Estimate',color:'#1A1A1A',fontSize:18},
            {type:'spacer',height:4},
            {type:'text',text:'TOTAL',color:'#999999',fontSize:10},
            {type:'spacer',height:4},
            {type:'text',text:'$3,012.99',color:'#1A1A1A',fontSize:17},
            {type:'spacer',height:6},
            {type:'text',text:'3 ITEMS',color:'#00BCD4',fontSize:11},
            {type:'spacer',height:4},
            {type:'text',text:'1 Service(s), 1 Equipment, 1 Material(s)',color:'#666666',fontSize:12},
            {type:'spacer',height:8},
            {type:'button',text:'+  Add items',color:'#FFFFFF',textColor:'#333333',fontSize:13,cornerRadius:20,borderColor:'#DDDDDD',borderWidth:1,actionName:'add_items_1'}
        ]},
        {type:'divider',color:'#EEEEEE',height:1},
        {type:'card',color:'#FFFFFF',cornerRadius:0,paddingH:14,paddingV:8,align:'start',children:[{type:'text',text:'Recommend',color:'#444444',fontSize:13}]}
    ]}
];
const defaultsEstimateDetail=[
    {type:'card',color:'#F5F5F5',cornerRadius:12,paddingH:16,paddingV:14,align:'start',children:[
        {type:'text',text:'Test Estimate',color:'#1A1A1A',fontSize:22},
        {type:'button',text:'Generate Name and Summary',color:'#1A1A1A',textColor:'#FFFFFF',fontSize:13,cornerRadius:20,actionName:'generate_summary'}
    ]},
    {type:'spacer',height:4},
    {type:'card',color:'#FFFFFF',cornerRadius:0,paddingH:16,paddingV:16,align:'start',borderColor:'#EEEEEE',borderWidth:1,actionName:'add_summary',children:[
        {type:'row',children:[{type:'text',text:'Summary',color:'#1A1A1A',fontSize:16},{type:'text',text:'Add',color:'#2196F3',fontSize:14}]}
    ]},
    {type:'divider',color:'#EEEEEE',height:1},
    {type:'card',color:'#FFFFFF',cornerRadius:0,paddingH:16,paddingV:16,align:'start',borderColor:'#EEEEEE',borderWidth:1,actionName:'add_documents',children:[
        {type:'row',children:[{type:'text',text:'Documents',color:'#1A1A1A',fontSize:16},{type:'text',text:'Add',color:'#2196F3',fontSize:14}]}
    ]},
    {type:'divider',color:'#EEEEEE',height:1},
    {type:'card',color:'#FFFFFF',cornerRadius:0,paddingH:16,paddingV:16,align:'start',borderColor:'#EEEEEE',borderWidth:1,actionName:'add_items',children:[
        {type:'row',children:[{type:'text',text:'Items',color:'#1A1A1A',fontSize:16},{type:'text',text:'Add',color:'#2196F3',fontSize:14}]},
        {type:'text',text:'No items added',color:'#999999',fontSize:13}
    ]},
    {type:'spacer',height:12},

        html+=`<div class="field"><label>Width (dp)</label><input type="number" min="1" max="200" value="${ch.width||16}" oninput="onChildField(${i},${ci},'width',this.value)"></div>`;
    } else if(ch.type==='divider'){
        html+=`<div class="fr"><div class="field"><label>Height</label><input type="number" min="1" max="10" value="${ch.height||1}" oninput="onChildField(${i},${ci},'height',this.value)"></div>
        <div class="field"><label>Color</label><div class="cf"><input type="color" value="${ch.color||'#CCCCCC'}" oninput="onChildField(${i},${ci},'color',this.value)"><code>${(ch.color||'#CCCCCC').toUpperCase()}</code></div></div></div>`;
    } else if(ch.type==='card'){
        html+=`<div class="fr"><div class="field"><label>BG</label><div class="cf"><input type="color" value="${ch.color||'#FFFFFF'}" oninput="onChildField(${i},${ci},'color',this.value)"><code>${(ch.color||'#FFFFFF').toUpperCase()}</code></div></div>
        <div class="field"><label>Radius</label><input type="number" min="0" max="50" value="${ch.cornerRadius||0}" oninput="onChildField(${i},${ci},'cornerRadius',this.value)"></div></div>
        <div class="fr"><div class="field"><label>Pad H</label><input type="number" min="0" max="50" value="${ch.paddingH||0}" oninput="onChildField(${i},${ci},'paddingH',this.value)"></div>
        <div class="field"><label>Pad V</label><input type="number" min="0" max="50" value="${ch.paddingV||0}" oninput="onChildField(${i},${ci},'paddingV',this.value)"></div></div>`;
        if(ch.children&&ch.children.length){
            html+=`<div style="margin-top:8px;padding:8px;background:var(--surface);border:1px dashed var(--outline);border-radius:6px" onclick="event.stopPropagation()">`;
            html+=`<div style="font-size:10px;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Nested (${ch.children.length})</div>`;
            ch.children.forEach((gc,gi)=>{
                const gcSummary=gc.text||gc.type+' '+(gc.height?gc.height+'dp':'');
                html+=`<div class="child-item" id="gc-${i}-${ci}-${gi}" style="display:flex;align-items:stretch" draggable="true" ondragstart="onGcDragStart(event,${i},${ci},${gi})" ondragend="onChildDragEnd(event)" ondragover="onGcDragOver(event,${i},${ci},${gi})" ondrop="onGcDrop(event,${i},${ci},${gi})">`;
                html+=`<div style="flex:1;min-width:0">`;
                html+=`<div class="child-hdr" role="button" tabindex="0" onclick="event.stopPropagation();toggleGcExpand(${i},${ci},${gi})"><span class="badge ${gc.type}">${gc.type}</span><span class="child-summary">${esc(gcSummary)}</span></div>`;
                html+=`<div class="child-editor" onclick="event.stopPropagation()">${buildGcEditor(gc,i,ci,gi)}</div>`;
                html+=`</div>`;
                html+=`<button class="child-del-btn" onclick="event.stopPropagation();removeGrandchild(${i},${ci},${gi})" title="Remove" style="align-self:flex-start;margin:6px 4px 0 0"><span class="material-icons-round" style="font-size:16px">close</span></button>`;
                html+=`</div>`;
            });
            html+=`</div>`;
        }
    }
    return html||'<div style="font-size:11px;color:#999">No editable properties</div>'}

function toggleChildExpand(parentIdx,childIdx){
    const id='child-'+parentIdx+'-'+childIdx;
    const el=document.getElementById(id);
    if(!el)return;
    const wasExpanded=el.classList.contains('child-expanded');
    document.querySelectorAll('.child-item').forEach(c=>c.classList.remove('child-expanded'));
    expandedGcId=null;
    if(!wasExpanded){el.classList.add('child-expanded');expandedChildId=id}else{expandedChildId=null}}


function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function updatePreview(){
    document.getElementById('bgColorCode').textContent=document.getElementById('bgColor').value.toUpperCase();
    sendToPreview()}
function sendToPreview(){
    const iframe=document.getElementById('composePreview');
    if(iframe&&iframe.contentWindow){
        try{iframe.contentWindow.postMessage(JSON.stringify(getConfig()),'*')}catch(e){}
    }}
function onPreviewLoad(){
    setTimeout(sendToPreview,500);
    setTimeout(sendToPreview,1500);
    setTimeout(sendToPreview,3000);
    setTimeout(sendToPreview,5000);
}



function getConfig(){const s=screens[activeScreen];const cfg={backgroundColor:document.getElementById('bgColor').value.toUpperCase()};if(s.scrollable)cfg.scrollable=true;if(s.padding!=null)cfg.padding=s.padding;cfg.elements=elements.map(el=>cleanEl(el));return cfg}
function cleanEl(el){
    const o={type:el.type,id:el.id};
    if(el.align)o.align=el.align;
    if(el.paddingH!=null)o.paddingH=el.paddingH;
    if(el.paddingV!=null)o.paddingV=el.paddingV;
    if(el.type==='text'){o.text=el.text;o.color=(el.color||'#000000').toUpperCase();o.fontSize=el.fontSize||16}
    else if(el.type==='button'){o.text=el.text;o.color=(el.color||'#6200EA').toUpperCase();o.textColor=(el.textColor||'#FFFFFF').toUpperCase();o.fontSize=el.fontSize||16;o.cornerRadius=el.cornerRadius!=null?el.cornerRadius:24;if(el.actionName)o.actionName=el.actionName;if(el.borderColor&&el.borderWidth){o.borderColor=el.borderColor.toUpperCase();o.borderWidth=el.borderWidth}}
    else if(el.type==='spacer'){o.height=el.height||16}
    else if(el.type==='hspacer'){o.width=el.width||16}
    else if(el.type==='divider'){o.color=(el.color||'#CCCCCC').toUpperCase();o.height=el.height||1}
    else if(el.type==='card'){o.color=(el.color||'#FFFFFF').toUpperCase();o.cornerRadius=el.cornerRadius!=null?el.cornerRadius:16;o.paddingH=el.paddingH!=null?el.paddingH:16;o.paddingV=el.paddingV!=null?el.paddingV:16;if(el.borderColor&&el.borderWidth){o.borderColor=el.borderColor.toUpperCase();o.borderWidth=el.borderWidth}if(el.actionName)o.actionName=el.actionName;if(el.children?.length)o.children=el.children.map(c=>cleanEl(c))}
    else if(el.type==='row'){if(el.children?.length)o.children=el.children.map(c=>cleanEl(c))}
    else if(el.type==='icon'){o.text=el.text;o.color=(el.color||'#333333').toUpperCase();o.fontSize=el.fontSize||24;if(el.actionName)o.actionName=el.actionName}
    return o}

async function copyJson(){const j=JSON.stringify(getConfig(),null,2);try{await navigator.clipboard.writeText(j)}catch{const t=document.createElement('textarea');t.value=j;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t)}showToast('JSON copied','content_copy')}
async function deployConfig(){
    const token=document.getElementById('ghToken').value.trim();
    if(!token){showToast('Enter a GitHub token first','warning',true);document.getElementById('ghToken').focus();return}
    localStorage.setItem('gh_token',token);setDeploy('deploying');
    const fp=currentFile();
    try{const existing=await fetch(`https://api.github.com/repos/${REPO}/${REPO_N}/contents/${fp}`,{headers:{Authorization:`Bearer ${token}`}});let sha=null;if(existing.ok)sha=(await existing.json()).sha;
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(getConfig(),null,2)+'\n')));
    const body={message:'Update '+screens[activeScreen].label+' screen from web editor',content};if(sha)body.sha=sha;
    const r=await fetch(`https://api.github.com/repos/${REPO}/${REPO_N}/contents/${fp}`,{method:'PUT',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){setDeploy('deployed');showToast(screens[activeScreen].label+' deployed!','cloud_done');pollActionStatus(token)}else{const e=await r.json();setDeploy('err');showToast('Deploy failed: '+(e.message||r.status),'error',true)}}
    catch(e){setDeploy('err');showToast('Deploy failed: '+e.message,'error',true)}}

let deployTimer=null;let deployStartTime=0;
function setDeploy(s){
    const b=document.getElementById('deployStatus'),t=document.getElementById('deployStatusText');
    if(s==='deploying'){stopDeployTimer();b.className='sb';t.textContent='Deploying...'}
    else if(s==='deployed'){b.className='sb ok';t.textContent='Deployed \u2713';deployStartTime=Date.now();startDeployTimer()}
    else if(s==='action_done'){stopDeployTimer();b.className='sb ok';t.textContent='\u2713 Binary ready';showToast('Binary .rc files generated!','check_circle');setTimeout(()=>{b.className='sb';t.textContent='Ready'},8000)}
    else if(s==='action_fail'){stopDeployTimer();b.className='sb err';t.textContent='\u2717 Action failed';setTimeout(()=>{b.className='sb';t.textContent='Ready'},8000)}
    else if(s==='err'){stopDeployTimer();b.className='sb err';t.textContent='Failed';setTimeout(()=>{b.className='sb';t.textContent='Ready'},5000)}
    else{stopDeployTimer();b.className='sb';t.textContent='Ready'}
}
function startDeployTimer(){
    stopDeployTimer();
    deployTimer=setInterval(()=>{
        const b=document.getElementById('deployStatus'),t=document.getElementById('deployStatusText');
        const elapsed=Math.round((Date.now()-deployStartTime)/1000);
        const mins=Math.floor(elapsed/60);
        const secs=elapsed%60;
        const timeStr=mins>0?mins+'m '+secs+'s':secs+'s';
        b.className='sb action';
        t.textContent='\u2699 Building binary... '+timeStr;
    },1000);
}
function stopDeployTimer(){if(deployTimer){clearInterval(deployTimer);deployTimer=null}}

async function pollActionStatus(token){
    await new Promise(r=>setTimeout(r,8000));
    const wfFile='convert.yml';
    for(let i=0;i<60;i++){
        try{
            const resp=await fetch(`https://api.github.com/repos/${REPO}/${REPO_N}/actions/workflows/${wfFile}/runs?per_page=1`,{headers:{Authorization:`Bearer ${token}`}});
            if(!resp.ok)break;
            const data=await resp.json();
            const run=data.workflow_runs?.[0];
            if(!run){await new Promise(r=>setTimeout(r,3000));continue}
            if(run.status==='completed'){
                if(run.conclusion==='success'){
                    const finishedAt=new Date(run.updated_at).getTime();
                    if(finishedAt>deployStartTime){setDeploy('action_done');return}
                }else{
                    const finishedAt=new Date(run.updated_at).getTime();
                    if(finishedAt>deployStartTime){setDeploy('action_fail');return}
                }
            }
        }catch(e){break}
        await new Promise(r=>setTimeout(r,4000));
    }
    stopDeployTimer();
}
function toggleToken(){const i=document.getElementById('ghToken'),ic=document.getElementById('tokenEye');if(i.type==='password'){i.type='text';ic.textContent='visibility_off'}else{i.type='password';ic.textContent='visibility'}}
let toastTimer;function showToast(msg,icon,err){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;document.getElementById('toastIcon').textContent=icon||'check_circle';t.style.background=err?'#b71c1c':'#323232';clearTimeout(toastTimer);t.classList.add('show');toastTimer=setTimeout(()=>t.classList.remove('show'),3000)}
init();
</script>
